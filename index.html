<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SLIDE BATTLE</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap');
:root{--bg:#07070e;--surface:#10101a;--card:#161624;--border:#1e1e30;--accent:#00ffaa;--accent2:#ff2d55;--text:#eeeef5;--muted:#44445a;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(0,255,170,.05) 0%,transparent 70%),radial-gradient(ellipse 50% 30% at 80% 90%,rgba(255,45,85,.04) 0%,transparent 70%);pointer-events:none;z-index:0;}
.screen{display:none;position:relative;z-index:1;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;}
.screen.active{display:flex;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,14vw,96px);letter-spacing:8px;color:#00ffaa;text-shadow:0 0 60px rgba(0,255,170,.35);margin-bottom:4px;}
.sub{font-size:10px;letter-spacing:5px;color:var(--muted);margin-bottom:40px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px 24px;width:100%;max-width:380px;margin-bottom:16px;}
.lbl{font-size:9px;letter-spacing:3px;color:var(--muted);margin-bottom:14px;}
.row{display:flex;gap:8px;margin-bottom:10px;}
input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Space Mono',monospace;font-size:14px;padding:12px 14px;outline:none;transition:border-color .2s;}
input:focus{border-color:#00ffaa;}
input::placeholder{color:var(--muted);}
.btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:2px;padding:12px 18px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn:hover{transform:translateY(-1px);}
.btnp{background:rgba(0,255,170,.08);border:1px solid #00ffaa;border-radius:8px;color:#00ffaa;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:2px;padding:14px;cursor:pointer;transition:all .2s;width:100%;}
.btnp:hover{background:rgba(0,255,170,.15);}
.btnd{background:rgba(255,45,85,.06);border:1px solid #ff2d55;border-radius:8px;color:#ff2d55;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:2px;padding:12px 18px;cursor:pointer;transition:all .2s;width:100%;margin-top:8px;}
.div{text-align:center;color:var(--muted);font-size:10px;letter-spacing:3px;margin:8px 0;}
.rcode{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:14px;color:#00ffaa;text-shadow:0 0 30px rgba(0,255,170,.3);}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.pslot{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 12px;display:flex;align-items:center;gap:10px;min-height:64px;}
.pav{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.pname{font-size:12px;font-weight:700;}
.ptag{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:2px;}
.eslot{width:36px;height:36px;border-radius:8px;border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:20px;flex-shrink:0;}
.srow{display:flex;gap:8px;margin-bottom:16px;}
.schip{flex:1;padding:8px;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);transition:all .2s;}
.schip.a{border-color:#00ffaa;color:#00ffaa;background:rgba(0,255,170,.06);}
.hint{font-size:10px;color:var(--muted);letter-spacing:1px;text-align:center;margin-bottom:16px;}
.cnum{font-family:'Bebas Neue',sans-serif;font-size:clamp(120px,30vw,200px);color:#00ffaa;text-shadow:0 0 80px rgba(0,255,170,.5);line-height:1;}
.clbl{font-size:13px;letter-spacing:4px;color:var(--muted);margin-top:12px;}
#gs{padding:12px;justify-content:flex-start;}
.gtop{width:100%;max-width:460px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.timer{font-family:'Bebas Neue',sans-serif;font-size:36px;color:#00ffaa;}
.bwrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px;width:100%;max-width:460px;margin-bottom:12px;}
#board{display:grid;gap:5px;aspect-ratio:1;}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:clamp(16px,5vw,34px);color:var(--text);cursor:pointer;transition:background .12s,transform .1s;user-select:none;position:relative;}
.tile::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.05) 0%,transparent 60%);border-radius:inherit;}
.tile:hover:not(.empty){background:#1e1e30;transform:scale(.97);}
.tile.empty{background:var(--bg);border-color:rgba(30,30,48,.5);cursor:default;}
.tile.correct{border-color:rgba(0,255,170,.4);color:#00ffaa;}
.opps{width:100%;max-width:460px;display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:10px;}
.ocard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
.ocard.done{border-color:rgba(0,255,170,.3);}
.ohdr{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.odot{width:8px;height:8px;border-radius:50%;}
.oname{font-size:10px;font-weight:700;}
.opbar{height:4px;background:var(--surface);border-radius:2px;overflow:hidden;}
.opfill{height:100%;border-radius:2px;transition:width .5s;}
.ost{font-size:9px;color:var(--muted);margin-top:4px;}
.rtitle{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,12vw,72px);letter-spacing:6px;margin-bottom:6px;}
.rsub{font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:28px;}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin-bottom:28px;}
.pi{display:flex;flex-direction:column;align-items:center;gap:6px;}
.pav2{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;border:2px solid var(--border);}
.pi.first .pav2{width:68px!important;height:68px!important;font-size:34px!important;}
.prank{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--muted);}
.pn2{font-size:11px;font-weight:700;}
.pt2{font-size:9px;color:var(--muted);}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);font-size:12px;font-weight:700;letter-spacing:1px;padding:10px 22px;border-radius:20px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.on{opacity:1;}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="screen active" id="lobby">
  <div class="logo">SLIDE</div>
  <div style="font-size:9px;color:#ff2d55;letter-spacing:2px;margin-bottom:4px">v3 — 2024</div>
  <div class="sub">BATTLE MULTIPLAYER</div>
  <div class="card">
    <div class="lbl">닉네임</div>
    <div class="row"><input id="nick" placeholder="닉네임 입력..." maxlength="10"></div>
  </div>
  <div class="card">
    <div class="lbl">방 만들기</div>
    <button class="btnp" id="btnCreate">✦ 새 방 만들기</button>
    <div class="div">— OR —</div>
    <div class="lbl">방 참가</div>
    <div class="row">
      <input id="codeIn" placeholder="방 코드..." maxlength="6" style="text-transform:uppercase;letter-spacing:4px;font-size:18px;text-align:center">
      <button class="btn" id="btnJoin">참가</button>
    </div>
  </div>
</div>

<div class="screen" id="ws">
  <div style="text-align:center;margin-bottom:28px">
    <div style="font-size:9px;letter-spacing:3px;color:var(--muted);margin-bottom:8px">ROOM CODE</div>
    <div class="rcode" id="rc">——</div>
  </div>
  <div class="card" style="max-width:380px;width:100%">
    <div class="lbl">링크 공유</div>
    <button class="btn" style="width:100%;margin-bottom:8px" id="btnCopy">🔗 링크 복사</button>
  </div>
  <div class="card" style="max-width:380px;width:100%">
    <div class="lbl">참가자 (최대 4명)</div>
    <div class="pgrid" id="pg"></div>
    <div class="lbl" style="margin-top:8px">퍼즐 크기 (방장만)</div>
    <div class="srow">
      <div class="schip a" id="s3">3×3</div>
      <div class="schip" id="s4">4×4</div>
      <div class="schip" id="s5">5×5</div>
    </div>
    <div class="hint" id="wh">친구를 기다리는 중...</div>
    <button class="btnp" id="btnStart" style="display:none">▶ 게임 시작</button>
    <button class="btnd" id="btnLeave">나가기</button>
  </div>
</div>

<div class="screen" id="cs" style="text-align:center">
  <div class="cnum" id="cn">3</div>
  <div class="clbl">준비하세요</div>
</div>

<div class="screen" id="gs">
  <div class="gtop">
    <div>
      <div style="font-size:9px;letter-spacing:2px;color:var(--muted);margin-bottom:2px">TIME</div>
      <div class="timer" id="tmr">0:00</div>
    </div>
    <div style="text-align:right">
      <div style="font-size:9px;letter-spacing:2px;color:var(--muted);margin-bottom:2px">MOVES</div>
      <div style="font-size:22px;font-weight:700" id="mv">0</div>
    </div>
  </div>
  <div class="opps" id="opps"></div>
  <div class="bwrap"><div id="board"></div></div>
  <div style="font-size:9px;color:var(--muted);letter-spacing:1px;text-align:center">타일을 눌러서 빈 칸으로 이동</div>
</div>

<div class="screen" id="rs" style="text-align:center">
  <div class="rtitle" id="rt">결과</div>
  <div class="rsub" id="rsb"></div>
  <div class="podium" id="pod"></div>
  <button class="btnp" style="max-width:320px;margin-bottom:10px" id="btnLobby">로비로 돌아가기</button>
  <button class="btn" style="max-width:320px;width:100%" id="btnAgain">같은 방에서 다시</button>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

  firebase.initializeApp({
    apiKey:"AIzaSyCx7fcluIGNqyjS3U_S3_HQPkXVdBDkOTc",
    authDomain:"we-go-together-ec728.firebaseapp.com",
    databaseURL:"https://we-go-together-ec728-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:"we-go-together-ec728",
    storageBucket:"we-go-together-ec728.firebasestorage.app",
    messagingSenderId:"330978890557",
    appId:"1:330978890557:web:850073b6d8dfb88f592b54"
  });
  var db = firebase.database();

  var COLORS = ['#00ffaa','#ff2d55','#ffd60a','#0a84ff'];
  var EMOJIS = ['🟢','🔴','🟡','🔵'];
  var S = {myId:null,myName:'',roomCode:null,isHost:false,puzzleSize:3,board:[],moves:0,startTime:null,timerIv:null,finished:false,roomRef:null};

  function ge(id){ return document.getElementById(id); }

  function showScreen(id){
    document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
    ge(id).classList.add('active');
  }

  function toast(msg, dur){
    var e = ge('toast');
    e.textContent = msg;
    e.classList.add('on');
    setTimeout(function(){ e.classList.remove('on'); }, dur || 2200);
  }

  function fmt(ms){
    var s = Math.floor(ms/1000);
    return Math.floor(s/60) + ':' + (s%60).toString().padStart(2,'0');
  }

  function getNick(){
    var v = ge('nick').value.trim();
    if(!v){ toast('닉네임을 입력하세요!'); return null; }
    return v;
  }

  function genId(){ return Math.random().toString(36).slice(2,9); }
  function genCode(){ return Math.random().toString(36).slice(2,8).toUpperCase(); }

  // ── PUZZLE ──
  function makePuzzle(sz){
    var n = sz*sz, b;
    do {
      b = [];
      for(var i=0;i<n;i++) b.push(i);
      for(var i=n-1;i>0;i--){
        var j = Math.floor(Math.random()*(i+1));
        var t = b[i]; b[i]=b[j]; b[j]=t;
      }
    } while(!solv(b,sz));
    return b;
  }

  function solv(b,sz){
    var flat=[],inv=0;
    for(var i=0;i<b.length;i++) if(b[i]!==0) flat.push(b[i]);
    for(var i=0;i<flat.length;i++) for(var j=i+1;j<flat.length;j++) if(flat[i]>flat[j]) inv++;
    if(sz%2===1) return inv%2===0;
    var er = sz-1-Math.floor(b.indexOf(0)/sz);
    return er%2===0 ? inv%2!==0 : inv%2===0;
  }

  function calcProg(b){
    var c=0;
    for(var i=0;i<b.length-1;i++) if(b[i]===i+1) c++;
    return Math.round(c/(b.length-1)*100);
  }

  function isWin(b){
    for(var i=0;i<b.length-1;i++) if(b[i]!==i+1) return false;
    return b[b.length-1]===0;
  }

  // ── BOARD ──
  function renderBoard(){
    var el = ge('board');
    el.style.gridTemplateColumns = 'repeat('+S.puzzleSize+',1fr)';
    el.innerHTML = '';
    for(var idx=0;idx<S.board.length;idx++){
      (function(i, val){
        var t = document.createElement('div');
        t.className = 'tile' + (val===0?' empty':'') + (val&&val===i+1?' correct':'');
        t.textContent = val || '';
        if(val) t.onclick = function(){ tryMove(i); };
        el.appendChild(t);
      })(idx, S.board[idx]);
    }
  }

  function tryMove(idx){
    if(S.finished) return;
    var empty = S.board.indexOf(0), sz = S.puzzleSize;
    var r=Math.floor(idx/sz), c=idx%sz, er=Math.floor(empty/sz), ec=empty%sz;
    if((Math.abs(r-er)===1&&c===ec)||(Math.abs(c-ec)===1&&r===er)){
      var t = S.board[idx]; S.board[idx]=S.board[empty]; S.board[empty]=t;
      S.moves++;
      ge('mv').textContent = S.moves;
      renderBoard();
      syncMe();
      if(isWin(S.board)) handleWin();
    }
  }

  function syncMe(){
    if(!S.roomCode||!S.myId) return;
    var el = S.startTime ? Date.now()-S.startTime : 0;
    db.ref('rooms/'+S.roomCode+'/players/'+S.myId).update({
      moves:S.moves, elapsed:el, progress:calcProg(S.board),
      finished:S.finished, finishTime:S.finished?el:null
    });
  }

  function handleWin(){
    S.finished = true;
    clearInterval(S.timerIv);
    toast('🏆 완료! '+fmt(Date.now()-S.startTime)+' / '+S.moves+'회', 3000);
    syncMe();
  }

  // ── ROOM ──
  function createRoom(){
    var name = getNick(); if(!name) return;
    var code = genCode();
    S.myId=genId(); S.myName=name; S.roomCode=code; S.isHost=true;
    var data = {host:S.myId, status:'waiting', puzzleSize:3, players:{}};
    data.players[S.myId] = {name:name,index:0,moves:0,elapsed:0,progress:0,finished:false,finishTime:null};
    db.ref('rooms/'+code).set(data)
      .then(function(){
        ge('rc').textContent = code;
        setURL(code);
        showScreen('ws');
        listenRoom();
      })
      .catch(function(e){ toast('오류: '+e.message); });
  }

  function joinRoom(){
    var name = getNick(); if(!name) return;
    var code = ge('codeIn').value.trim().toUpperCase();
    if(!code||code.length<4){ toast('방 코드를 입력하세요'); return; }
    db.ref('rooms/'+code).once('value').then(function(snap){
      if(!snap.exists()){ toast('방을 찾을 수 없어요'); return; }
      var room = snap.val();
      if(room.status!=='waiting'){ toast('이미 게임이 시작됐어요'); return; }
      var cnt = Object.keys(room.players||{}).length;
      if(cnt>=4){ toast('방이 꽉 찼어요 (최대 4명)'); return; }
      S.myId=genId(); S.myName=name; S.roomCode=code; S.isHost=false;
      var pd = {name:name,index:cnt,moves:0,elapsed:0,progress:0,finished:false,finishTime:null};
      db.ref('rooms/'+code+'/players/'+S.myId).set(pd)
        .then(function(){
          ge('rc').textContent = code;
          setURL(code);
          showScreen('ws');
          listenRoom();
        });
    }).catch(function(e){ toast('오류: '+e.message); });
  }

  function listenRoom(){
    if(S.roomRef) S.roomRef.off();
    S.roomRef = db.ref('rooms/'+S.roomCode);
    S.roomRef.on('value', function(snap){
      if(!snap.exists()){ toast('방이 사라졌어요'); goLobby(); return; }
      var room = snap.val();
      S.puzzleSize = room.puzzleSize || 3;
      var players = [];
      var pl = room.players || {};
      for(var id in pl) players.push(Object.assign({id:id}, pl[id]));
      players.sort(function(a,b){ return a.index-b.index; });

      ge('s3').className = 'schip'+(S.puzzleSize===3?' a':'');
      ge('s4').className = 'schip'+(S.puzzleSize===4?' a':'');
      ge('s5').className = 'schip'+(S.puzzleSize===5?' a':'');

      if(room.status==='waiting'){
        renderWaiting(players);
        ge('btnStart').style.display = (S.isHost&&players.length>=2) ? 'block' : 'none';
        ge('wh').textContent = players.length<2
          ? '친구를 기다리는 중... ('+players.length+'/4)'
          : S.isHost ? players.length+'명 준비됨 — 시작 버튼을 누르세요!'
          : players.length+'명 준비됨 — 방장을 기다리는 중';
      }

      var inCountdown = ge('cs').classList.contains('active');
      var inGame = ge('gs').classList.contains('active');
      if(room.status==='countdown' && !inCountdown && !inGame){
        doCountdown(room.puzzle, room.puzzleSize, players);
      }

      if(room.status==='playing'){
        if(ge('gs').classList.contains('active')) renderOpps(players);
        var allDone = players.length>0 && players.every(function(p){ return p.finished; });
        if(allDone) showResults(players);
      }
    });
  }

  function renderWaiting(players){
    var g = ge('pg'); g.innerHTML='';
    for(var i=0;i<4;i++){
      var p = players[i];
      var slot = document.createElement('div');
      slot.className = 'pslot';
      if(p){
        slot.style.borderColor = COLORS[i];
        slot.innerHTML = '<div class="pav" style="background:'+COLORS[i]+';color:#000">'+EMOJIS[i]+'</div>'
          +'<div><div class="pname">'+p.name+'</div>'
          +'<div class="ptag">'+(p.id===S.myId?'YOU':'PLAYER '+(i+1))+'</div></div>';
      } else {
        slot.innerHTML = '<div class="eslot">+</div>'
          +'<div style="font-size:10px;color:var(--muted)">대기 중</div>';
      }
      g.appendChild(slot);
    }
  }

  function renderOpps(players){
    var el = ge('opps'); el.innerHTML='';
    for(var i=0;i<players.length;i++){
      var p = players[i];
      if(p.id===S.myId) continue;
      var c = document.createElement('div');
      c.className = 'ocard'+(p.finished?' done':'');
      c.innerHTML = '<div class="ohdr">'
        +'<div class="odot" style="background:'+COLORS[p.index||0]+'"></div>'
        +'<div class="oname">'+p.name+'</div>'
        +(p.finished?'<div style="font-size:9px;color:#00ffaa;margin-left:auto">DONE</div>':'')
        +'</div>'
        +'<div class="opbar"><div class="opfill" style="width:'+(p.progress||0)+'%;background:'+COLORS[p.index||0]+'"></div></div>'
        +'<div class="ost">'+(p.moves||0)+'회 · '+fmt(p.elapsed||0)+'</div>';
      el.appendChild(c);
    }
  }

  function startGame(){
    if(!S.isHost) return;
    var puzzle = makePuzzle(S.puzzleSize);
    db.ref('rooms/'+S.roomCode).update({status:'countdown',puzzle:puzzle,puzzleSize:S.puzzleSize})
      .then(function(){
        db.ref('rooms/'+S.roomCode+'/players').once('value').then(function(snap){
          var players=[];
          var pl=snap.val()||{};
          for(var id in pl) players.push(Object.assign({id:id},pl[id]));
          players.sort(function(a,b){ return a.index-b.index; });
          doCountdown(puzzle, S.puzzleSize, players);
        });
      });
  }

  function doCountdown(puzzle, size, players){
    showScreen('cs');
    S.board = puzzle.slice();
    S.puzzleSize = size;
    S.moves = 0;
    S.finished = false;
    var n = 3;
    ge('cn').textContent = n;
    var iv = setInterval(function(){
      n--;
      if(n>0){
        ge('cn').textContent = n;
      } else {
        clearInterval(iv);
        ge('cn').textContent = 'GO!';
        setTimeout(function(){
          showScreen('gs');
          ge('mv').textContent = '0';
          ge('tmr').textContent = '0:00';
          renderBoard();
          renderOpps(players);
          S.startTime = Date.now();
          clearInterval(S.timerIv);
          S.timerIv = setInterval(function(){
            var e = ge('tmr');
            if(e) e.textContent = fmt(Date.now()-S.startTime);
          }, 500);
          if(S.isHost) db.ref('rooms/'+S.roomCode).update({status:'playing'});
        }, 600);
      }
    }, 900);
  }

  function showResults(players){
    clearInterval(S.timerIv);
    var sorted = players.slice().sort(function(a,b){
      if(a.finished&&!b.finished) return -1;
      if(!a.finished&&b.finished) return 1;
      return (a.finishTime||99999999)-(b.finishTime||99999999);
    });
    var win = sorted[0] && sorted[0].id===S.myId;
    ge('rt').textContent = win ? '🏆 우승!' : '게임 종료';
    ge('rsb').textContent = win ? 'YOU WIN!' : (sorted[0]?sorted[0].name+'님이 우승':'');
    var pod = ge('pod'); pod.innerHTML='';
    var disp = sorted.length>=2 ? [sorted[1],sorted[0],sorted[2]].filter(Boolean) : [sorted[0]].filter(Boolean);
    for(var i=0;i<disp.length;i++){
      var p = disp[i];
      var rank = sorted.indexOf(p)+1;
      var item = document.createElement('div');
      item.className = 'pi'+(rank===1?' first':'');
      item.innerHTML = '<div class="prank">'+(rank===1?'👑':rank+'위')+'</div>'
        +'<div class="pav2" style="border-color:'+COLORS[p.index||0]+'">'+EMOJIS[p.index||0]+'</div>'
        +'<div class="pn2" style="color:'+COLORS[p.index||0]+'">'+p.name+(p.id===S.myId?' (나)':'')+'</div>'
        +'<div class="pt2">'+(p.finished?fmt(p.finishTime):'DNF')+'</div>'
        +'<div class="pt2">'+(p.moves||0)+'회</div>';
      pod.appendChild(item);
    }
    showScreen('rs');
  }

  function selectSize(sz){
    if(!S.isHost){ toast('방장만 바꿀 수 있어요'); return; }
    db.ref('rooms/'+S.roomCode).update({puzzleSize:sz});
  }

  function leaveRoom(){
    if(S.roomRef) S.roomRef.off();
    clearInterval(S.timerIv);
    if(S.roomCode&&S.myId) db.ref('rooms/'+S.roomCode+'/players/'+S.myId).remove();
    resetState();
    showScreen('lobby');
    try{history.pushState({},'',location.pathname);}catch(e){}
  }

  function goLobby(){
    if(S.roomRef) S.roomRef.off();
    clearInterval(S.timerIv);
    resetState();
    showScreen('lobby');
    try{history.pushState({},'',location.pathname);}catch(e){}
  }

  function playAgain(){
    if(!S.isHost){ toast('방장만 다시 시작할 수 있어요'); return; }
    db.ref('rooms/'+S.roomCode+'/players').once('value').then(function(snap){
      var upd = {};
      var pl = snap.val()||{};
      for(var id in pl){
        upd['rooms/'+S.roomCode+'/players/'+id+'/moves'] = 0;
        upd['rooms/'+S.roomCode+'/players/'+id+'/elapsed'] = 0;
        upd['rooms/'+S.roomCode+'/players/'+id+'/progress'] = 0;
        upd['rooms/'+S.roomCode+'/players/'+id+'/finished'] = false;
        upd['rooms/'+S.roomCode+'/players/'+id+'/finishTime'] = null;
      }
      upd['rooms/'+S.roomCode+'/status'] = 'waiting';
      db.ref().update(upd).then(function(){ showScreen('ws'); });
    });
  }

  function copyLink(){
    var url = location.origin+location.pathname+'?room='+S.roomCode;
    navigator.clipboard.writeText(url).then(function(){ toast('링크 복사됨! 친구에게 보내세요'); });
  }

  function resetState(){
    S.myId=null; S.myName=''; S.roomCode=null; S.isHost=false;
    S.board=[]; S.moves=0; S.startTime=null; S.finished=false; S.roomRef=null;
  }

  function setURL(code){
    try{
      var u = new URL(location);
      u.searchParams.set('room', code);
      history.pushState({}, '', u);
    }catch(e){ console.log('URL update skipped (local file)'); }
  }

  // ── BIND BUTTONS ──
  ge('btnCreate').onclick = createRoom;
  ge('btnJoin').onclick   = joinRoom;
  ge('btnStart').onclick  = startGame;
  ge('btnLeave').onclick  = leaveRoom;
  ge('btnLobby').onclick  = goLobby;
  ge('btnAgain').onclick  = playAgain;
  ge('btnCopy').onclick   = copyLink;
  ge('s3').onclick = function(){ selectSize(3); };
  ge('s4').onclick = function(){ selectSize(4); };
  ge('s5').onclick = function(){ selectSize(5); };

  // Auto-join from URL
  var ur = new URLSearchParams(location.search).get('room');
  if(ur){
    ge('codeIn').value = ur;
    toast('방 코드 '+ur+' 자동 입력됨 — 닉네임 입력 후 참가하세요', 3000);
  }

}); // end DOMContentLoaded
</script>
</body>
</html>
